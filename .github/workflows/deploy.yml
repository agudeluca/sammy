name: Deploy

on:
  push:
    branches: [release]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_TAG_APP }}
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_TAG_APP }}-cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_TAG_APP }}-cache,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ secrets.DOCKERHUB_TAG_WEB }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_TAG_WEB }}-cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_TAG_WEB }}-cache,mode=max

      - name: Trigger Dokploy deployment
        run: curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for service to come up..."
          for i in $(seq 1 24); do
            if curl -sfkL "${{ secrets.PROD_API_URL }}/health" > /dev/null 2>&1; then
              echo "Service is up!"
              exit 0
            fi
            echo "Attempt $i/24 — retrying in 5s..."
            sleep 5
          done
          echo "Service did not respond in time"
          exit 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install app dependencies
        working-directory: ./app
        run: bun install --frozen-lockfile

      - name: Run smoke tests against production
        working-directory: ./app
        env:
          API_URL: ${{ secrets.PROD_API_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: bun test tests/smoke.test.ts --timeout 60000
