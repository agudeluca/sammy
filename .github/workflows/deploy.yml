name: Deploy

on:
  push:
    branches: [release]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_TAG_APP }}
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_TAG_APP }}-cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_TAG_APP }}-cache,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ secrets.DOCKERHUB_TAG_WEB }}
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_TAG_WEB }}-cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_TAG_WEB }}-cache,mode=max

      - name: Trigger Dokploy deployment
        run: curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
