services:
  app:
    image: ${DOCKERHUB_TAG_APP}
    ports:
      - "3011:3001"
    volumes:
      - sammy-data:/app/data
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX:-sammy}
      - PINECONE_HOST=${PINECONE_HOST}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-8h}
      - DATABASE_PATH=/app/data/sammy.db
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3010}
    restart: unless-stopped

  web:
    image: ${DOCKERHUB_TAG_WEB}
    ports:
      - "3010:3000"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  sammy-data:
