services:
  app:
    image: ${DOCKERHUB_TAG_APP}
    pull_policy: always
    ports:
      - "3011:3001"
    volumes:
      - sammy-data:/app/data
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX:-sammy}
      - PINECONE_HOST=${PINECONE_HOST}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-8h}
      - DATABASE_PATH=/app/data/sammy.db
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3010}
      - REDASH_API_KEY=${REDASH_API_KEY}
      - REDASH_BASE_URL=${REDASH_BASE_URL:-https://redash.humand.co}
      - REDASH_VACATION_QUERY_ID=${REDASH_VACATION_QUERY_ID:-33517}
      - REDASH_KNOWLEDGE_QUERY_ID=${REDASH_KNOWLEDGE_QUERY_ID:-33514}
    restart: unless-stopped

  web:
    image: ${DOCKERHUB_TAG_WEB}
    pull_policy: always
    ports:
      - "3010:3000"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  sammy-data:
