_type: export
__export_format: 4
__export_date: "2026-03-18T00:00:00.000Z"
__export_source: "insomnia.desktop.app:v9.0.0"
resources:
  # ── Workspace ───────────────────────────────────────────────────────────────
  - _id: wrk_sammy_v2
    _type: workspace
    name: Sammy V2
    description: ""
    scope: collection

  # ── Environments ────────────────────────────────────────────────────────────
  - _id: env_base
    _type: environment
    parentId: wrk_sammy_v2
    name: Base Environment
    data: {}

  - _id: env_local
    _type: environment
    parentId: env_base
    name: Local
    data:
      base_url: http://localhost:3001
      token: ""

  # ── Folders ─────────────────────────────────────────────────────────────────
  - _id: fld_health
    _type: request_group
    parentId: wrk_sammy_v2
    name: Health

  - _id: fld_auth
    _type: request_group
    parentId: wrk_sammy_v2
    name: Auth

  - _id: fld_admin
    _type: request_group
    parentId: wrk_sammy_v2
    name: Admin

  - _id: fld_chat
    _type: request_group
    parentId: wrk_sammy_v2
    name: Chat

  - _id: fld_parser
    _type: request_group
    parentId: wrk_sammy_v2
    name: Parser (internal)

  # ── Health ───────────────────────────────────────────────────────────────────
  - _id: req_health
    _type: request
    parentId: fld_health
    name: Health check
    method: GET
    url: "{{ _.base_url }}/health"
    headers: []
    body: {}

  # ── Auth ─────────────────────────────────────────────────────────────────────
  - _id: req_auth_communities
    _type: request
    parentId: fld_auth
    name: Get communities
    method: GET
    url: "{{ _.base_url }}/api/auth/communities"
    headers: []
    body: {}

  - _id: req_auth_login_alice
    _type: request
    parentId: fld_auth
    name: "Login — acme admin (alice)"
    method: POST
    url: "{{ _.base_url }}/api/auth/login"
    headers:
      - name: Content-Type
        value: application/json
    body:
      mimeType: application/json
      text: |
        {
          "communityId": "acme",
          "username": "admin",
          "password": "huckaton"
        }
    afterResponseScript: |
      const body = await insomnia.response.json();
      if (body.token) {
        insomnia.environment.set('token', body.token);
        console.log('Token saved for alice (acme admin)');
      }

  - _id: req_auth_login_bob
    _type: request
    parentId: fld_auth
    name: "Login — acme collaborator (bob)"
    method: POST
    url: "{{ _.base_url }}/api/auth/login"
    headers:
      - name: Content-Type
        value: application/json
    body:
      mimeType: application/json
      text: |
        {
          "communityId": "acme",
          "username": "bob",
          "password": "huckaton"
        }
    afterResponseScript: |
      const body = await insomnia.response.json();
      if (body.token) {
        insomnia.environment.set('token', body.token);
        console.log('Token saved for bob (acme collaborator)');
      }

  - _id: req_auth_login_carol
    _type: request
    parentId: fld_auth
    name: "Login — globex admin (carol)"
    method: POST
    url: "{{ _.base_url }}/api/auth/login"
    headers:
      - name: Content-Type
        value: application/json
    body:
      mimeType: application/json
      text: |
        {
          "communityId": "globex",
          "username": "admin",
          "password": "huckaton"
        }
    afterResponseScript: |
      const body = await insomnia.response.json();
      if (body.token) {
        insomnia.environment.set('token', body.token);
        console.log('Token saved for carol (globex admin)');
      }

  - _id: req_auth_login_dave
    _type: request
    parentId: fld_auth
    name: "Login — globex collaborator (dave)"
    method: POST
    url: "{{ _.base_url }}/api/auth/login"
    headers:
      - name: Content-Type
        value: application/json
    body:
      mimeType: application/json
      text: |
        {
          "communityId": "globex",
          "username": "dave",
          "password": "huckaton"
        }
    afterResponseScript: |
      const body = await insomnia.response.json();
      if (body.token) {
        insomnia.environment.set('token', body.token);
        console.log('Token saved for dave (globex collaborator)');
      }

  # ── Admin ────────────────────────────────────────────────────────────────────
  - _id: req_admin_upload
    _type: request
    parentId: fld_admin
    name: Upload document
    method: POST
    url: "{{ _.base_url }}/api/upload"
    headers:
      - name: Authorization
        value: "Bearer {{ _.token }}"
    body:
      mimeType: multipart/form-data
      params:
        - name: file
          type: file
          fileName: ""

  - _id: req_admin_documents
    _type: request
    parentId: fld_admin
    name: Get documents
    method: GET
    url: "{{ _.base_url }}/api/documents"
    headers:
      - name: Authorization
        value: "Bearer {{ _.token }}"
    body: {}

  # ── Chat ─────────────────────────────────────────────────────────────────────
  - _id: req_chat_simple
    _type: request
    parentId: fld_chat
    name: "Chat — simple question"
    method: POST
    url: "{{ _.base_url }}/api/chat"
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: "Bearer {{ _.token }}"
    body:
      mimeType: application/json
      text: |
        {
          "question": "¿De qué tratan los documentos?",
          "history": []
        }

  - _id: req_chat_history
    _type: request
    parentId: fld_chat
    name: "Chat — with history"
    method: POST
    url: "{{ _.base_url }}/api/chat"
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: "Bearer {{ _.token }}"
    body:
      mimeType: application/json
      text: |
        {
          "question": "¿Puedes darme más detalles?",
          "history": [
            { "role": "user",      "content": "¿De qué tratan los documentos?" },
            { "role": "assistant", "content": "Los documentos tratan sobre..." }
          ]
        }

  # ── Parser (internal) ────────────────────────────────────────────────────────
  - _id: req_parser_health
    _type: request
    parentId: fld_parser
    name: Parser — health
    method: GET
    url: http://localhost:8000/health
    headers: []
    body: {}

  - _id: req_parser_parse
    _type: request
    parentId: fld_parser
    name: Parser — parse file
    method: POST
    url: http://localhost:8000/parse
    headers: []
    body:
      mimeType: multipart/form-data
      params:
        - name: file
          type: file
          fileName: ""
